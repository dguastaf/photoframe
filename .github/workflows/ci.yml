name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        id: pytest
        run: |
          set -o pipefail
          pytest --junitxml=junit.xml 2>&1 | tee pytest.log
          summary=$(grep -E '^=+ [0-9]+ (passed|failed)' pytest.log | tail -1 | sed -E 's/^=+ | =+$//g' || true)
          echo "summary=${summary}" >> "$GITHUB_OUTPUT"

      - name: Test summary
        if: always() && steps.pytest.outputs.summary != ''
        run: |
          echo "## Test results" >> "$GITHUB_STEP_SUMMARY"
          echo "**${{ steps.pytest.outputs.summary }}**" >> "$GITHUB_STEP_SUMMARY"

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: server/junit.xml
          check_name: Tests
          comment_mode: ${{ github.event_name == 'pull_request' && 'always' || 'off' }}
