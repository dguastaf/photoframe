name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  ui-preview:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify UI preview assets on PR
        run: |
          chmod +x scripts/ui-preview/check-pr-diff.sh
          ./scripts/ui-preview/check-pr-diff.sh origin/${{ github.base_ref }}

  client-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Test summary
        if: always()
        run: echo "**Client unit tests (Vitest)** passed" >> "$GITHUB_STEP_SUMMARY"

  client-e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/pyproject.toml

      - name: Install server dependencies
        working-directory: server
        run: pip install -e ".[dev]"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Install Playwright browser
        working-directory: client
        run: npx playwright install --with-deps chromium

      - name: Run photo library flow e2e
        env:
          CLIENT_URL: http://localhost:6389
        run: |
          set -euo pipefail
          python server/scripts/ci_client_e2e_stack.py &
          STACK_PID=$!
          cd client
          npm run dev &
          VITE_PID=$!
          cleanup() {
            kill "$STACK_PID" "$VITE_PID" 2>/dev/null || true
            wait "$STACK_PID" "$VITE_PID" 2>/dev/null || true
          }
          trap cleanup EXIT
          for _ in $(seq 1 60); do
            curl -sf http://127.0.0.1:52525/health >/dev/null && break
            sleep 1
          done
          curl -sf http://127.0.0.1:52525/health >/dev/null
          for _ in $(seq 1 60); do
            curl -sf http://127.0.0.1:6389/ >/dev/null && break
            sleep 1
          done
          curl -sf http://127.0.0.1:6389/ >/dev/null
          npm run test:e2e

      - name: Test summary
        if: always()
        run: echo "**Client e2e (photo library flow)** passed" >> "$GITHUB_STEP_SUMMARY"

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        id: pytest
        run: |
          set -o pipefail
          pytest --junitxml=junit.xml 2>&1 | tee pytest.log
          summary=$(grep -E '^=+ [0-9]+ (passed|failed)' pytest.log | tail -1 | sed -E 's/^=+ | =+$//g' || true)
          echo "summary=${summary}" >> "$GITHUB_OUTPUT"

      - name: Test summary
        if: always() && steps.pytest.outputs.summary != ''
        run: |
          echo "## Test results" >> "$GITHUB_STEP_SUMMARY"
          echo "**${{ steps.pytest.outputs.summary }}**" >> "$GITHUB_STEP_SUMMARY"

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: server/junit.xml
          check_run: false
          job_summary: false
          comment_mode: ${{ github.event_name == 'pull_request' && 'always' || 'off' }}

      - name: Show results on PR check
        if: always() && steps.pytest.outputs.summary != ''
        uses: actions/github-script@v7
        env:
          TEST_SUMMARY: ${{ steps.pytest.outputs.summary }}
        with:
          script: |
            const summary = process.env.TEST_SUMMARY;
            const { owner, repo } = context.repo;
            const { data: { jobs } } = await github.rest.actions.listJobsForWorkflowRun({
              owner,
              repo,
              run_id: context.runId,
            });
            const job = jobs.find((j) => j.name === context.job);
            if (!job?.check_run_url) {
              core.warning("Could not find this job's check run");
              return;
            }
            const checkRunId = Number(job.check_run_url.split("/").pop());
            await github.rest.checks.update({
              owner,
              repo,
              check_run_id: checkRunId,
              output: {
                title: summary,
                summary: `**${summary}**`,
              },
            });
