name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  anti-slop:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> "$GITHUB_PATH"

      - name: Review PR diff for AI slop
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          set -euo pipefail

          git fetch origin "${{ github.base_ref }}"
          BASE="origin/${{ github.base_ref }}"

          OUTPUT="$(
            agent -p --output-format text \
              "You are running in CI. Review ONLY the git diff: ${BASE}...HEAD.
              Do NOT modify any files. Use git diff and git log as needed.

              Read and apply every rule in .cursor/BUGBOT.md.

              List each issue as: path:line — short reason — suggested fix.
              If no issues: print exactly one line: SLOP_REVIEW_RESULT: PASS
              If any issues: print findings then exactly: SLOP_REVIEW_RESULT: FAIL"
          )"

          echo "$OUTPUT"

          if echo "$OUTPUT" | grep -q 'SLOP_REVIEW_RESULT: FAIL'; then
            echo "::error::Anti-slop review found issues (see job log)."
            exit 1
          fi

          if ! echo "$OUTPUT" | grep -q 'SLOP_REVIEW_RESULT: PASS'; then
            echo "::error::Anti-slop review did not return SLOP_REVIEW_RESULT: PASS or FAIL."
            exit 1
          fi

      - name: Anti-slop summary
        if: success()
        run: echo "Anti-slop review passed." >> "$GITHUB_STEP_SUMMARY"

      - name: Trigger Bugbot review
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" --body "bugbot run"

  test:
    needs: anti-slop
    if: >
      github.event_name != 'pull_request' ||
      needs.anti-slop.result == 'success'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        id: pytest
        run: |
          set -o pipefail
          pytest --junitxml=junit.xml 2>&1 | tee pytest.log
          summary=$(grep -E '^=+ [0-9]+ (passed|failed)' pytest.log | tail -1 | sed -E 's/^=+ | =+$//g' || true)
          echo "summary=${summary}" >> "$GITHUB_OUTPUT"

      - name: Test summary
        if: always() && steps.pytest.outputs.summary != ''
        run: |
          echo "## Test results" >> "$GITHUB_STEP_SUMMARY"
          echo "**${{ steps.pytest.outputs.summary }}**" >> "$GITHUB_STEP_SUMMARY"

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: server/junit.xml
          check_run: false
          job_summary: false
          comment_mode: ${{ github.event_name == 'pull_request' && 'always' || 'off' }}

      - name: Show results on PR check
        if: always() && steps.pytest.outputs.summary != ''
        uses: actions/github-script@v7
        env:
          TEST_SUMMARY: ${{ steps.pytest.outputs.summary }}
        with:
          script: |
            const summary = process.env.TEST_SUMMARY;
            const { owner, repo } = context.repo;
            const { data: { jobs } } = await github.rest.actions.listJobsForWorkflowRun({
              owner,
              repo,
              run_id: context.runId,
            });
            const job = jobs.find((j) => j.name === context.job);
            if (!job?.check_run_url) {
              core.warning("Could not find this job's check run");
              return;
            }
            const checkRunId = Number(job.check_run_url.split("/").pop());
            await github.rest.checks.update({
              owner,
              repo,
              check_run_id: checkRunId,
              output: {
                title: summary,
                summary: `**${summary}**`,
              },
            });
