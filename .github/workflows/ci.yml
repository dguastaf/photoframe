name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  sdlc-policy:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v5

      - name: Validate SDLC policy (planning + implementation + test plan)
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          printf '%s' "$PR_BODY" > /tmp/pr-body.md
          python3 scripts/sdlc/validate_review.py --ci \
            --branch "${{ github.head_ref }}" \
            --pr-body-file /tmp/pr-body.md

  client-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        id: vitest
        run: |
          set -o pipefail
          npm test 2>&1 | tee vitest.log
          summary=$(grep -E '^\s+Tests\s+' vitest.log | tail -1 | sed -E 's/^[[:space:]]+//' || true)
          echo "summary=${summary}" >> "$GITHUB_OUTPUT"

      - name: Test summary
        if: always() && steps.vitest.outputs.summary != ''
        run: |
          echo "## Client unit tests (Vitest)" >> "$GITHUB_STEP_SUMMARY"
          echo "**${{ steps.vitest.outputs.summary }}**" >> "$GITHUB_STEP_SUMMARY"

  client-e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/pyproject.toml

      - name: Install server dependencies
        working-directory: server
        run: pip install -e ".[dev]"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build client
        working-directory: client
        run: npm run build

      - name: Install Playwright browser
        working-directory: client
        run: npx playwright install --with-deps chromium

      - name: Run photo library flow e2e
        id: playwright
        env:
          CLIENT_URL: http://localhost:6389
        run: |
          set -euo pipefail
          cd server
          python -u scripts/ci_client_e2e_stack.py > ../stack.log 2>&1 &
          STACK_PID=$!
          cd ../client
          npm run preview -- --host 127.0.0.1 >> ../vite.log 2>&1 &
          VITE_PID=$!
          cleanup() {
            kill "$STACK_PID" "$VITE_PID" 2>/dev/null || true
            wait "$STACK_PID" "$VITE_PID" 2>/dev/null || true
          }
          trap cleanup EXIT
          for _ in $(seq 1 90); do
            if grep -q '^READY ' ../stack.log 2>/dev/null; then
              break
            fi
            if ! kill -0 "$STACK_PID" 2>/dev/null; then
              echo "error: mock API stack exited early" >&2
              cat ../stack.log >&2 || true
              exit 1
            fi
            sleep 1
          done
          if ! grep -q '^READY ' ../stack.log 2>/dev/null; then
            echo "error: mock API stack did not become ready" >&2
            cat ../stack.log >&2 || true
            exit 1
          fi
          curl -sf http://localhost:52525/api/v0/photos >/dev/null
          for _ in $(seq 1 60); do
            if curl -sf http://127.0.0.1:6389/ >/dev/null; then
              break
            fi
            if ! kill -0 "$VITE_PID" 2>/dev/null; then
              echo "error: Vite preview exited early" >&2
              cat ../vite.log >&2 || true
              exit 1
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:6389/ >/dev/null || {
            echo "error: Vite preview not reachable" >&2
            cat ../vite.log >&2 || true
            exit 1
          }
          npm run test:e2e 2>&1 | tee e2e.log
          summary=$(grep -E '^[0-9]+/[0-9]+ passed' e2e.log | tail -1 || true)
          echo "summary=${summary}" >> "$GITHUB_OUTPUT"

      - name: Client e2e test summary
        if: always() && steps.playwright.outputs.summary != ''
        run: |
          echo "## Client e2e tests (Playwright)" >> "$GITHUB_STEP_SUMMARY"
          echo "**${{ steps.playwright.outputs.summary }}**" >> "$GITHUB_STEP_SUMMARY"

  server-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run pytest
        id: pytest
        run: |
          set -o pipefail
          pytest --junitxml=junit.xml 2>&1 | tee pytest.log
          summary=$(grep -E '^=+ [0-9]+ (passed|failed)' pytest.log | tail -1 | sed -E 's/^=+ | =+$//g' || true)
          echo "summary=${summary}" >> "$GITHUB_OUTPUT"

      - name: Test summary
        if: always() && steps.pytest.outputs.summary != ''
        run: |
          echo "## Server tests (pytest)" >> "$GITHUB_STEP_SUMMARY"
          echo "**${{ steps.pytest.outputs.summary }}**" >> "$GITHUB_STEP_SUMMARY"

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: server/junit.xml
          check_run: false
          job_summary: false
          comment_mode: ${{ github.event_name == 'pull_request' && 'always' || 'off' }}

      - name: Show results on PR check
        if: always() && steps.pytest.outputs.summary != ''
        uses: actions/github-script@v7
        env:
          TEST_SUMMARY: ${{ steps.pytest.outputs.summary }}
        with:
          script: |
            const summary = process.env.TEST_SUMMARY;
            const { owner, repo } = context.repo;
            const { data: { jobs } } = await github.rest.actions.listJobsForWorkflowRun({
              owner,
              repo,
              run_id: context.runId,
            });
            const job = jobs.find((j) => j.name === context.job);
            if (!job?.check_run_url) {
              core.warning("Could not find this job's check run");
              return;
            }
            const checkRunId = Number(job.check_run_url.split("/").pop());
            await github.rest.checks.update({
              owner,
              repo,
              check_run_id: checkRunId,
              output: {
                title: summary,
                summary: `**${summary}**`,
              },
            });
